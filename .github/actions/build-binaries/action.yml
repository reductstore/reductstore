name: 'Build Binaries'
description: 'Builds binaries for a specific target and uploads them as artifacts.'
inputs:
  minimal_rust_version:
    description: 'Minimal Rust version.'
    required: true
  action_github_token:
    description: 'GitHub token for setup-protoc.'
    required: true
  target:
    description: 'Target triple.'
    required: true
  os:
    description: 'Operating system.'
    required: true
  compiler:
    description: 'Compiler package name.'
    required: true
  access-key-id:
    description: 'AWS Access Key ID'
    required: true
  secret-access-key:
    description: 'AWS Secret Access Key'
    required: true

runs:
  using: 'composite'
  steps:
    - uses: reductstore/setup-protoc@ac76da16b8e70736e159368a4bc962934d1f825a # master
      with:
        version: '26.x'
        repo-token: ${{ inputs.action_github_token }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: ${{ inputs.minimal_rust_version }}

    - name: Install toolchain
      shell: bash
      run: rustup target add ${{ inputs.target }}

    - name: Install gcc
      if: ${{ startsWith(matrix.os, 'ubuntu-') }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.compiler }}

    - name: Install gcc
      if: ${{ startsWith(matrix.os, 'macos-') && matrix.compiler != '' }}
      shell: bash
      run: |
        brew install ${{ matrix.compiler }}

    - uses: ilammy/setup-nasm@v1

    - name: AWS Credentials and Cargo Cache
      uses: ./.github/actions/aws-cargo-cache
      with:
        target: ${{ inputs.target }}
        profile: release
        access-key-id: ${{ inputs.access-key-id }}
        secret-access-key: ${{ inputs.secret-access-key }}


    - name: Install cargo-export
      shell: bash
      run: cargo install cargo-export --version 0.3.0 --locked --force

    - name: Install Syft
      shell: bash
      run: |
        set -euo pipefail
        SYFT_VERSION=v1.42.3
        SYFT_VERSION_NO_V="${SYFT_VERSION#v}"
        mkdir -p "$HOME/.local/bin"

        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "$arch" in
          x86_64) arch="amd64" ;;
          aarch64|arm64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $arch"
            exit 1
            ;;
        esac

        artifact="syft_${SYFT_VERSION_NO_V}_${os}_${arch}.tar.gz"
        checksums="syft_${SYFT_VERSION_NO_V}_checksums.txt"
        base_url="https://github.com/anchore/syft/releases/download/${SYFT_VERSION}"

        curl -sSfL "${base_url}/${checksums}" -o "/tmp/${checksums}"
        curl -sSfL "${base_url}/${artifact}" -o "/tmp/${artifact}"

        grep "  ${artifact}$" "/tmp/${checksums}" > /tmp/syft-checksum.txt
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c /tmp/syft-checksum.txt
        else
          expected_sha=$(cut -d' ' -f1 /tmp/syft-checksum.txt)
          actual_sha=$(shasum -a 256 "/tmp/${artifact}" | cut -d' ' -f1)
          [ "$expected_sha" = "$actual_sha" ]
        fi

        tar -xzf "/tmp/${artifact}" -C "$HOME/.local/bin" syft
        chmod +x "$HOME/.local/bin/syft"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/syft" version

    - name: Build binary
      run: cargo build --locked --profile release -p reductstore --target ${{ inputs.target }} --features "fs-backend,web-console,zenoh-api"
      shell: bash

    - name: Upload binary (PR)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      # Only upload Linux binary for PRs for sanity test
      if: github.event_name == 'pull_request' && inputs.target == 'x86_64-unknown-linux-gnu'
      with:
        name: reductstore-${{ inputs.target }}
        path: target/${{inputs.target}}/release/reductstore
        if-no-files-found: 'error'

    - name: Upload binary (Release)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      if: github.event_name != 'pull_request'
      with:
        name: reductstore-${{ inputs.target }}
        path: target/${{inputs.target}}/release/reductstore${{ inputs.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}
        if-no-files-found: 'error'

    - name: Generate SBOM
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p /tmp/sbom
        sbom_path="/tmp/sbom/reductstore.${{ inputs.target }}.sbom.spdx.json"

        # Scanning only the final binary usually produces an almost-empty SPDX document.
        # Catalog Cargo.lock to capture crate dependency and license metadata.
        syft "file:Cargo.lock" -o spdx-json="$sbom_path"

    - name: Upload SBOM
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: reductstore-sbom-${{ inputs.target }}
        path: /tmp/sbom/reductstore.${{ inputs.target }}.sbom.spdx.json
        if-no-files-found: 'error'

    - name: Build and export tests
      run: cargo export target/${{ inputs.target }}/tests -- test --locked --quiet --profile release --target ${{ inputs.target }} --features "fs-backend,web-console,zenoh-api" --lib
      shell: bash

    - name: Upload tests
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: reductstore-tests-${{ inputs.target }}
        path: target/${{ inputs.target }}/tests
