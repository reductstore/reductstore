name: 'Build Binaries'
description: 'Builds binaries for a specific target and uploads them as artifacts.'
inputs:
  minimal_rust_version:
    description: 'Minimal Rust version.'
    required: true
  target:
    description: 'Target triple.'
    required: true
  os:
    description: 'Operating system.'
    required: true
  compiler:
    description: 'Compiler package name.'
    required: true
  access-key-id:
    description: 'AWS Access Key ID'
    required: true
  secret-access-key:
    description: 'AWS Secret Access Key'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install protoc
      shell: bash
      env:
        PROTOC_VERSION: '26.1'
      run: |
        set -euo pipefail

        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            asset="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            ;;
          Linux-ARM64)
            asset="protoc-${PROTOC_VERSION}-linux-aarch_64.zip"
            ;;
          macOS-X64)
            asset="protoc-${PROTOC_VERSION}-osx-x86_64.zip"
            ;;
          macOS-ARM64)
            asset="protoc-${PROTOC_VERSION}-osx-aarch_64.zip"
            ;;
          Windows-X64)
            asset="protoc-${PROTOC_VERSION}-win64.zip"
            ;;
          *)
            echo "Unsupported runner platform for protoc: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        archive_path="${RUNNER_TEMP}/${asset}"
        install_dir="${RUNNER_TEMP}/protoc-${PROTOC_VERSION}-${RUNNER_OS}-${RUNNER_ARCH}"

        rm -rf "${install_dir}"
        mkdir -p "${install_dir}"

        curl -fsSL --retry 5 --retry-all-errors \
          "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${asset}" \
          -o "${archive_path}"

        python_bin="python3"
        if ! command -v "${python_bin}" >/dev/null 2>&1; then
          python_bin="python"
        fi

        "${python_bin}" -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' "${archive_path}" "${install_dir}"

        chmod +x "${install_dir}/bin/protoc"
        echo "${install_dir}/bin" >> "${GITHUB_PATH}"
        echo "PROTOC=${install_dir}/bin/protoc" >> "${GITHUB_ENV}"
        echo "PROTOC_INCLUDE=${install_dir}/include" >> "${GITHUB_ENV}"
        "${install_dir}/bin/protoc" --version

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.minimal_rust_version }}

    - name: Install toolchain
      shell: bash
      run: rustup target add ${{ inputs.target }}

    - name: Install gcc
      if: ${{ startsWith(matrix.os, 'ubuntu-') }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.compiler }}

    - name: Install gcc
      if: ${{ startsWith(matrix.os, 'macos-') && matrix.compiler != '' }}
      shell: bash
      run: |
        brew install ${{ matrix.compiler }}

    - uses: ilammy/setup-nasm@v1

    - name: AWS Credentials and Cargo Cache
      uses: ./.github/actions/aws-cargo-cache
      with:
        target: ${{ inputs.target }}
        profile: release
        access-key-id: ${{ inputs.access-key-id }}
        secret-access-key: ${{ inputs.secret-access-key }}


    - name: Install cargo-export
      shell: bash
      run: cargo install cargo-export --force

    - name: Install Syft
      shell: bash
      run: |
        set -euo pipefail
        SYFT_VERSION=v1.42.3
        mkdir -p "$HOME/.local/bin"
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin" "$SYFT_VERSION"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/syft" version

    - name: Build binary
      run: cargo build --profile release -p reductstore --target ${{ inputs.target }} --features "fs-backend,web-console,zenoh-api"
      shell: bash

    - name: Upload binary (PR)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      # Only upload Linux binary for PRs for sanity test
      if: github.event_name == 'pull_request' && inputs.target == 'x86_64-unknown-linux-gnu'
      with:
        name: reductstore-${{ inputs.target }}
        path: target/${{inputs.target}}/release/reductstore
        if-no-files-found: 'error'

    - name: Upload binary (Release)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      if: github.event_name != 'pull_request'
      with:
        name: reductstore-${{ inputs.target }}
        path: target/${{inputs.target}}/release/reductstore${{ inputs.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}
        if-no-files-found: 'error'

    - name: Generate SBOM
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p /tmp/sbom
        sbom_path="/tmp/sbom/reductstore.${{ inputs.target }}.sbom.spdx.json"

        # Scanning only the final binary usually produces an almost-empty SPDX document.
        # Catalog Cargo.lock to capture crate dependency and license metadata.
        syft "file:Cargo.lock" -o spdx-json="$sbom_path"

    - name: Upload SBOM
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: reductstore-sbom-${{ inputs.target }}
        path: /tmp/sbom/reductstore.${{ inputs.target }}.sbom.spdx.json
        if-no-files-found: 'error'

    - name: Build and export tests
      run: cargo export target/${{ inputs.target }}/tests -- test --quiet --profile release --target ${{ inputs.target }} --features "fs-backend,web-console,zenoh-api" --lib
      shell: bash

    - name: Upload tests
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: reductstore-tests-${{ inputs.target }}
        path: target/${{ inputs.target }}/tests
