name: 'Generate Code Coverage'
description: 'Downloads and runs test binaries with coverage instrumentation for a given target.'
inputs:
  os:
    description: 'Operating system.'
    required: true
  target:
    description: 'Target triple.'
    required: true
  action_github_token:
    description: 'GitHub token for authentication.'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: 1.89.0

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - uses: reductstore/setup-protoc@ac76da16b8e70736e159368a4bc962934d1f825a # master
      with:
        version: '26.x'
        repo-token: ${{ inputs.action_github_token }}

    - name: AWS Credentials and Cargo Cache
      uses: ./.github/actions/aws-cargo-cache
      with:
        target: ${{ inputs.target }}
        profile: coverage

    - name: Run code coverage
      shell: bash
      env:
        CARGO_TERM_COLOR: always
        RUST_LOG: debug
      run: |
        set -e -x
        cargo llvm-cov --locked --features fs-backend,ci --workspace --lcov --output-path lcov.info

    - name: Upload coverage artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: lcov.info
        path: lcov.info
