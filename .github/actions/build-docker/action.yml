name: 'Build Docker Image'
description: 'Builds Linux Docker image from prebuilt artifacts and uploads it.'
inputs:
  platform:
    description: 'Docker platform (linux/amd64, linux/arm64, linux/arm/v7).'
    required: true
  target:
    description: 'Rust target triple.'
    required: true
  image_artifact_name:
    description: 'Artifact name for exported image tar.'
    required: false
    default: image
  image_tag:
    description: 'Tag used for docker export.'
    required: true
  reduct_cli_version:
    description: 'Pinned reduct-cli release tag used in docker image build context.'
    required: false
    default: v0.11.1
  docker_labels:
    description: 'Optional docker labels.'
    required: false
    default: ''
  build_outputs:
    description: 'Outputs for docker/build-push-action.'
    required: false
    default: type=docker,dest=/tmp/image.tar
  upload_artifact:
    description: 'Upload /tmp/image.tar as artifact.'
    required: false
    default: 'true'
  sbom:
    description: 'Generate SBOM attestation.'
    required: false
    default: 'false'
  provenance:
    description: 'Generate provenance attestation.'
    required: false
    default: 'false'
outputs:
  digest:
    description: 'Image digest from docker/build-push-action.'
    value: ${{ steps.build.outputs.digest }}
runs:
  using: 'composite'
  steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: reductstore-${{ inputs.target }}
        path: /tmp/reductstore/

    - name: Download pinned reduct-cli release asset
      shell: bash
      run: |
        set -euo pipefail
        target="${{ inputs.target }}"
        version="${{ inputs.reduct_cli_version }}"
        ext="tar.gz"
        if [[ "$target" == *windows* ]]; then
          ext="zip"
        fi

        case "$target" in
          aarch64-apple-darwin) expected_sha="770efc69859331736d393411e463d146c5a81e42583e6292b48e82f79f402960" ;;
          aarch64-unknown-linux-gnu) expected_sha="4557e8bd0b7ff7398f0299a246446c74eb3c456c21c6f62f5221f85bf2dea67c" ;;
          armv7-unknown-linux-gnueabihf) expected_sha="e51d67fb9bbd66da14b599e13e827878a53c37a0aa7822088bb068685ca29d4e" ;;
          x86_64-apple-darwin) expected_sha="9a2edae8551c819e3b85f4c0abcae1f046bbccd39e1cb5eee3984a92a6114524" ;;
          x86_64-pc-windows-gnu) expected_sha="5ee6dc83d46a4796f374b79414b91c3e1b84815027b6f6e22453fe73ef0a6a62" ;;
          x86_64-unknown-linux-gnu) expected_sha="b4d2806a76697bc59caa08bf00601b44419f11388fae720fc88516c9ad257221" ;;
          *)
            echo "Unsupported reduct-cli target: $target"
            exit 1
            ;;
        esac

        asset_name="reduct-cli.${target}.${ext}"
        asset_url="https://github.com/reductstore/reduct-cli/releases/download/${version}/${asset_name}"

        mkdir -p /tmp/reduct-cli
        curl -sSfL "$asset_url" -o "/tmp/${asset_name}"
        echo "${expected_sha}  /tmp/${asset_name}" | sha256sum -c -
        echo "Downloaded and verified ${asset_name} from ${asset_url}"

        if [ "$ext" = "zip" ]; then
          unzip -q "/tmp/${asset_name}" -d /tmp/reduct-cli
        else
          tar -xzf "/tmp/${asset_name}" -C /tmp/reduct-cli
        fi

        REDUCT_CLI_BIN="$(find /tmp/reduct-cli -type f -name reduct-cli | head -n 1)"
        if [ -z "$REDUCT_CLI_BIN" ]; then
          echo "reduct-cli binary not found in extracted archive /tmp/${asset_name}"
          find /tmp/reduct-cli -maxdepth 3 -type f -print || true
          exit 1
        fi
        chmod +x "$REDUCT_CLI_BIN"

    - name: Prepare docker build context from artifacts
      shell: bash
      run: |
        set -euo pipefail
        REDUCTSTORE_BIN="$(find /tmp/reductstore -type f -name reductstore | head -n 1)"
        if [ -z "$REDUCTSTORE_BIN" ]; then
          echo "reductstore binary not found in /tmp/reductstore"
          exit 1
        fi
        REDUCT_CLI_BIN="$(find /tmp/reduct-cli -type f -name reduct-cli | head -n 1)"
        if [ -z "$REDUCT_CLI_BIN" ]; then
          echo "reduct-cli binary not found in /tmp/reduct-cli"
          exit 1
        fi

        rm -rf .image-build
        mkdir -p .image-build/usr/local/bin .image-build/data
        install -m 0755 "$REDUCTSTORE_BIN" .image-build/usr/local/bin/reductstore
        install -m 0755 "$REDUCT_CLI_BIN" .image-build/usr/local/bin/reduct-cli

    - name: Verify build context binaries
      shell: bash
      run: |
        set -euo pipefail
        test -x .image-build/usr/local/bin/reductstore
        test -x .image-build/usr/local/bin/reduct-cli
        ls -l .image-build/usr/local/bin/reductstore .image-build/usr/local/bin/reduct-cli

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and export
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: buildx.Dockerfile
        tags: ${{ inputs.image_tag }}
        platforms: ${{ inputs.platform }}
        labels: ${{ inputs.docker_labels }}
        outputs: ${{ inputs.build_outputs }}
        sbom: ${{ inputs.sbom }}
        provenance: ${{ inputs.provenance }}

    - name: Upload artifact
      if: ${{ inputs.upload_artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ inputs.image_artifact_name }}
        path: /tmp/image.tar
