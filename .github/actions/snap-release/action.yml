name: 'Build Snap Package'
description: 'Builds a snap package from prebuilt reductstore binary artifacts.'
inputs:
  arch:
    description: 'Architecture (amd64, arm64, etc.)'
    required: true
  snapcraft_store_login:
    description: 'Snapcraft store login credentials.'
    required: true
  release:
    description: 'Release channel (stable/edge)'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Resolve binary artifact
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.arch }}" in
          amd64)
            target_triple="x86_64-unknown-linux-gnu"
            ;;
          arm64)
            target_triple="aarch64-unknown-linux-gnu"
            ;;
          *)
            echo "Unsupported architecture: ${{ inputs.arch }}"
            exit 1
            ;;
        esac
        echo "TARGET_TRIPLE=${target_triple}" >> "$GITHUB_ENV"
        echo "BINARY_ARTIFACT=reductstore-${target_triple}" >> "$GITHUB_ENV"

    - name: Download binary artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.BINARY_ARTIFACT }}
        path: .snap-build/bin

    - name: Prepare snap payload files
      shell: bash
      run: |
        set -euo pipefail
        chmod +x .snap-build/bin/reductstore

    - name: Set snap version from Cargo.toml and GITHUB_SHA
      shell: bash
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import os, re
        from pathlib import Path

        cargo = Path('reductstore/Cargo.toml').read_text(encoding='utf-8')
        m = re.search(r'(?ms)^\[package\]\n(.*?)(?:^\[|\Z)', cargo)
        if not m:
            raise SystemExit('Could not find [package] section in reductstore/Cargo.toml')
        v = re.search(r'^version\s*=\s*"([^"]+)"\s*$', m.group(1), re.M)
        if not v:
            raise SystemExit('Could not find package.version in reductstore/Cargo.toml')

        sha = os.environ.get('GITHUB_SHA', '')[:7]
        if not sha:
            raise SystemExit('GITHUB_SHA is required for snap version')
        version = f"{v.group(1)}-git{sha}"

        p = Path('snap/snapcraft.yaml')
        text = p.read_text(encoding='utf-8')
        text, n = re.subn(r'^version:\s*"[^"]*"\s*$', f'version: "{version}"', text, count=1, flags=re.M)
        if n != 1:
            raise SystemExit('Could not update version in snap/snapcraft.yaml')
        p.write_text(text, encoding='utf-8')
        print(f'set snap version to {version}')
        PY

    - uses: snapcore/action-build@v1
      id: build-snap
      with:
        snapcraft-args: "pack --verbose --build-for=${{ inputs.arch }}"

    - name: Install snap for testing (amd64 only)
      if: ${{ inputs.arch == 'amd64' }}
      shell: bash
      run: |
        sudo snap install --dangerous ${{ steps.build-snap.outputs.snap }}
        snap services reductstore

    - name: Save snap name in environment variable
      shell: bash
      run: |
        echo "SNAP_NAME=$(ls *.snap | cut -f1 | grep ${{ inputs.arch }})" >> $GITHUB_ENV
